name: Bocchi OS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. ЧИСТИМ ХЛАМ (Освобождаем ~100ГБ)
      - name: Cleanup and Free Space
        run: |
          sudo docker image prune -a -f
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "/usr/local/share/powershell"
          sudo rm -rf "/usr/local/lib/node_modules"
          echo "Место после очистки:"
          df -h

      # 2. СТАВИМ REPO
      - name: Install Repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      # 3. КАЧАЕМ ИСХОДНИКИ
      - name: Initialize and Sync
        run: |
          git config --global user.email "bocchi@os.com"
          git config --global user.name "Bocchi"
          
          # Инициализируем твой манифест
          repo init -u https://github.com/yessaimon/bocchi_os.git -b main -m manifest.xml
          
          # Качаем только текущий срез (--depth=1), чтобы влезло на диск
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags --depth=1

      # 4. ГОТОВИМ ОКРУЖЕНИЕ
      - name: Setup Build Environment
        run: |
          source build/envsetup.sh
          lunch bocchi_sapphire-userdebug

      # 5. КОМПИЛЯЦИЯ (Самый долгий этап)
      - name: Build Bocchi OS
        run: |
          source build/envsetup.sh
          mka bacon -j$(nproc --all)
