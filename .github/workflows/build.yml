name: Bocchi OS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      - name: Debug Network and Access
        run: |
          echo "=== ТЕСТ ДОСТУПА К РЕПОЗИТОРИЯМ ==="
          echo "Проверка твоего Вендора:"
          git ls-remote https://github.com/yessaimon/android_vendor_xiaomi_sapphire.git || echo "ОШИБКА: Нет доступа к Vendor"
          
          echo -e "\nПроверка твоего Device Tree:"
          git ls-remote https://github.com/yessaimon/android_device_xiaomi_sapphire.git || echo "ОШИБКА: Нет доступа к Device Tree"
          
          echo -e "\nПроверка НАЙДЕННОГО ЯДРА (Prebuilt):"
          git ls-remote https://github.com/sm6225-sapphire/device_xiaomi_sapphire-kernel.git || echo "ОШИБКА: Нет доступа к Prebuilt Kernel"
          echo "===================================="

      - name: Initialize Repo
        run: |
          # Настройка гита для работы repo
          git config --global user.email "bocchi@os.com"
          git config --global user.name "Bocchi"
          
          # Инициализация и синхронизация (тянем только нужное, чтобы сэкономить время)
          repo init -u https://github.com/yessaimon/bocchi_os.git -b main -m manifest.xml
          repo sync -c -j$(nproc --all) --force-sync --no-clone-bundle --no-tags

      - name: Setup Build Environment
        run: |
          # Подключаем скрипты сборки
          source build/envsetup.sh
          # Выбираем твой девайс
          lunch bocchi_sapphire-userdebug

      - name: Build Bocchi OS
        run: |
          # Погнали собирать саму прошивку!
          mka bacon -j$(nproc --all)
      - name: Setup Build Environment
        run: |
          # Проверяем, где мы находимся и что скачалось (для подстраховки)
          ls -R build/envsetup.sh || echo "Файл не найден в корне, ищем..."
          source build/envsetup.sh
          lunch bocchi_sapphire-userdebug

      - name: Build Bocchi OS
        run: |
          source build/envsetup.sh
          mka bacon -j$(nproc --all)
