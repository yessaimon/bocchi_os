name: Bocchi OS Build

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. ОЧИСТКА МЕСТА (Освобождаем ~100ГБ под исходники)
      - name: Cleanup and Free Space
        run: |
          sudo docker image prune -a -f
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /usr/local/lib/android
          sudo rm -rf /opt/ghc
          sudo rm -rf /usr/local/share/boost
          sudo rm -rf "/usr/local/share/powershell"
          sudo rm -rf "/usr/local/lib/node_modules"
          df -h

      # 2. УСТАНОВКА REPO
      - name: Install Repo
        run: |
          mkdir ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo

      # 3. ИНИЦИАЛИЗАЦИЯ И УСКОРЕННАЯ СИНХРОНИЗАЦИЯ
      - name: Initialize and Sync
        run: |
          git config --global user.email "bocchi@os.com"
          git config --global user.name "Bocchi"
          
          # Полная очистка перед стартом
          rm -rf .repo
          
          # Инициализируем только нужную ветку с глубиной 1
          repo init -u https://github.com/LineageOS/android.git -b lineage-21.0 --git-lfs --depth=1
          
          # Подтягиваем твой манифест
          mkdir -p .repo/local_manifests
          curl -L https://raw.githubusercontent.com/yessaimon/bocchi_os/main/manifest.xml > .repo/local_manifests/bocchi.xml
          
          # Турбо-синхронизация: без тегов, только текущая ветка, 16 потоков
          repo sync -c -j4 --force-sync --no-clone-bundle --no-tags --current-branch

      # 4. ПОДГОТОВКА СБОРКИ
      - name: Setup Build Environment
        run: |
          source build/envsetup.sh
          lunch lineage_sapphire-userdebug

      # 5. СТАРТ КОМПИЛЯЦИИ (Тут начнется магия)
      - name: Build Bocchi OS
        run: |
          source build/envsetup.sh
          mka bacon -j$(nproc --all)
